name: Review PR
on:
  pull_request:

jobs:
  review:
    name: Claude Code Review
    concurrency:
      group: claude-code-review-${{ github.event.pull_request.number }}-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ["runners-set-amd64-medium"]
    permissions:
      actions: read
      checks: write
      contents: read
      id-token: write
      pull-requests: write
    env:
      REPO: ${{ github.repository }}
      REPO_OWNER: ${{ github.repository_owner }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Dump context (debug)
        env:
          CTX: ${{ toJSON(github) }}
        run: echo "${CTX}" | jq

      - name: Set envs
        id: envs
        run: |
          echo "REPO_NAME=${REPO#*/}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate bash commands for claude
        id: scripts
        run: |
          GET_PR_COMMENTS_FILE="./claude-get-pr-comments.sh"
          echo "get-pr-comments=bash ${GET_PR_COMMENTS_FILE}" >> "$GITHUB_OUTPUT"
          cat <<"EOF" > "${GET_PR_COMMENTS_FILE}"
          #!/bin/env bash
          GRAPHQL_QUERY=$(cat <<"QUERY"
          query($owner: String!, $repo: String!, $pr: Int!) {
            repository(owner: $owner, name: $repo) {
              pullRequest(number: $pr) {
                reviewThreads(first: 100) {
                  nodes {
                    isOutdated
                    isResolved
                    comments(first: 100) {
                      nodes {
                        isMinimized
                        outdated
                        fullDatabaseId
                        author {
                          login
                        }
                        path
                        startLine
                        line
                        body
                      }
                    }
                  }
                }
              }
            }
          }
          QUERY
          )

          JQ_QUERY=$(cat <<"QUERY"
          .data.repository.pullRequest.reviewThreads.nodes[]
          | select(.isOutdated == false)
          | (if .isResolved == false then "" else "(comment thread marked as resolved)\n" end) as $resolvedStatus
          | .comments.nodes[]
          | select(.isMinimized == false and .outdated == false)
          | (if .startLine == null then "line: \(.line)" else "lines: \(.startLine)-\(.line)" end) as $lines
          | "\($resolvedStatus)id: \(.fullDatabaseId)\nauthor: \(.author.login)\npath: \(.path), \($lines)\ncomment: \(.body)\n---"
          QUERY
          )


          gh api graphql -f owner="${{ env.REPO_OWNER }}" -f repo="${{ env.REPO_NAME }}" -F pr="${{ env.PR_NUMBER }}" -f query="$GRAPHQL_QUERY" \
          | jq -r "$JQ_QUERY"
          EOF

          GET_PR_REVIEWS_FILE="./claude-get-pr-reviews.sh"
          echo "get-pr-reviews=bash ${GET_PR_REVIEWS_FILE}" >> "$GITHUB_OUTPUT"
          cat <<"EOF" > "${GET_PR_REVIEWS_FILE}"
          #!/bin/env bash
          JQ_QUERY=$(cat <<"QUERY"
          sort_by(.submitted_at)[]
          | select(.state != "COMMENTED")
          | select(.user.login == "claude[bot]")
          | "submitted at: \(.submitted_at): review_id=\(.id) state=\(.state) author: \(.user.login)\ncomment: \(.body)\n---"
          QUERY
          )
          gh api /repos/${{ env.REPO }}/pulls/${{ env.PR_NUMBER }}/reviews \
          | jq -r "$JQ_QUERY"
          EOF


          echo 'dismiss-review=gh api --method PATCH /repos/${{ env.REPO }}/pulls/comments/{comment_id} -f "message=Critical issue found"' >> "$GITHUB_OUTPUT"
          echo 'update-comment=gh api --method PUT /repos/${{ env.REPO }}/pulls/${{ env.PR_NUMBER }}/reviews/{review_id}/dismissals -F body="@/path/to/file"' >> "$GITHUB_OUTPUT"

          echo "::group::debug outputs"
          cat "$GITHUB_OUTPUT"
          echo "---------------"
          echo "${GET_PR_COMMENTS_FILE}"
          cat "${GET_PR_COMMENTS_FILE}"
          echo "---------------"
          echo "${GET_PR_REVIEWS_FILE}"
          cat "${GET_PR_REVIEWS_FILE}"
          echo "::endgroup::"

      - name: Run claude code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "*"
          track_progress: true
          use_sticky_comment: true
          prompt: |-
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ env.PR_NUMBER }}

            Perform a comprehensive code review.
            **Be brief but precise**: less text is easier to read and comprehend.

            Get diff of pull-request using `gh pr diff` command.
            Focus on the following areas:

            1. **Code Quality**
               - Clean code principles and best practices
               - Proper error handling and edge cases
               - Code readability and maintainability

            2. **Security**
               - Check for potential security vulnerabilities
               - Validate input sanitization
               - Review authentication/authorization logic

            3. **Performance**
               - Identify potential performance bottlenecks
               - Review database queries for efficiency
               - Check for memory leaks or resource issues

            4. **Testing**
               - Verify adequate test coverage
               - Review test quality and edge cases
               - Check for missing test scenarios

            Use top-level comments for general observations or praise. Don't mention PR's creator in comments.

            Provide feedback using inline comments for specific issues. Inline comments **MUST BE SHORT**.
            Use inline comments only to report issues. Do not leave inline comments when you think there is a good change.
            Don't write "Good enhancement" comments!

            # IMPORTANT!
            Before leaving inline comments, get all the review comments with this command:
            ${{ steps.scripts.outputs.get-pr-comments }}
            Analyze those comments. Take into account all of them, before suggesting changes.
            - If you see comments from humans - you have to assume they have better knowledge of the project than you.
            - If comment is resolved - then you have to assume the issue has been resolved or does not require any changes.
            - If you see comments whose author is claude - instead of creating new comments, update them with this command:
            ${{ steps.scripts.outputs.update-comment }}
            (before running the command, use Write tool to write new comment body into a file)

            # Review conclusion
            Before submitting review get the previous review resolutions with this command:
            ${{ steps.scripts.outputs.get-pr-reviews }}
            Consider command output when submitting your review:
            - You can do one of the following things: either approve PR or do nothing, or dismiss your approval.
            - You cannot request changes when submitting review.
            - You cannot leave general comments when submitting review.
            - Don't repeat your review! If previous review approved the PR - don't approve it again.
            - Do not write anything in review body. Summary is already is in top level comment.
            - If pull-request looks good with no critical issues - approve it with `gh pr review --approve` command.
              Only approve if there are no security vulnerabilities, critical bugs, or major code quality issues.
            - Dismiss your approval only if there are very critical issues.
              You can dismiss approval with this command:
              ${{ steps.scripts.outputs.dismiss-review }}
          claude_args: |
            --model "claude-sonnet-4-6" --allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh api:*),Bash(jq:*),Bash(${{ steps.scripts.outputs.get-pr-comments }}:*),Bash(${{ steps.scripts.outputs.get-pr-reviews }}:*)"
